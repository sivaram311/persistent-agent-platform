<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persistent Agent Platform</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 0.75rem 1.25rem; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        header h1 { font-size: 1.15rem; font-weight: 600; }
        header span { font-size: 0.75rem; color: #94a3b8; }
        .app { flex: 1; display: flex; min-height: 0; }
        .sidebar { width: 280px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 1rem; border-bottom: 1px solid #334155; }
        .sidebar-header h2 { font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .btn-new { width: 100%; padding: 0.65rem; background: #2563eb; border: none; border-radius: 0.5rem; color: #fff; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
        .btn-new:hover { background: #1d4ed8; }
        #sessionList { flex: 1; overflow-y: auto; padding: 0.5rem; }
        .session-item { padding: 0.75rem; border-radius: 0.5rem; cursor: pointer; margin-bottom: 0.35rem; border: 1px solid transparent; transition: background 0.15s; }
        .session-item:hover { background: #334155; }
        .session-item.active { background: #1e3a5f; border-color: #2563eb; }
        .session-item .title { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.25rem; }
        .session-item .meta { font-size: 0.7rem; color: #64748b; }
        .chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; padding: 1rem 1.25rem; }
        #messages { flex: 1; overflow-y: auto; padding: 0.5rem 0; display: flex; flex-direction: column; gap: 0.75rem; }
        .msg { padding: 0.75rem 1rem; border-radius: 0.75rem; max-width: 85%; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
        .msg.user { background: #2563eb; align-self: flex-end; }
        .msg.assistant { background: #1e293b; border: 1px solid #334155; align-self: flex-start; }
        .msg.status { background: #0f172a; border: 1px dashed #475569; align-self: center; font-size: 0.85rem; color: #94a3b8; max-width: 100%; }
        .controls { display: flex; gap: 0.5rem; padding: 0.75rem 0 0; flex-wrap: wrap; flex-shrink: 0; }
        select, input, button { font-family: inherit; font-size: 0.9rem; border-radius: 0.5rem; border: 1px solid #334155; padding: 0.6rem 0.8rem; background: #1e293b; color: #e2e8f0; }
        input { flex: 1; min-width: 180px; }
        button#send { background: #2563eb; border-color: #2563eb; cursor: pointer; font-weight: 600; }
        button#send:hover { background: #1d4ed8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .meta-bar { font-size: 0.75rem; color: #64748b; padding-bottom: 0.5rem; flex-shrink: 0; }
        .loading { display: none; align-items: center; gap: 0.5rem; color: #94a3b8; font-size: 0.85rem; padding: 0.35rem 0; flex-shrink: 0; }
        .loading.active { display: flex; }
        .spinner { width: 14px; height: 14px; border: 2px solid #334155; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #streamLog { display: none; max-height: 100px; overflow-y: auto; font-family: Consolas, monospace; font-size: 0.72rem; background: #0b1120; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.5rem; margin-bottom: 0.5rem; color: #64748b; flex-shrink: 0; }
        #streamLog.active { display: block; }
        .empty-sessions { padding: 1rem; color: #64748b; font-size: 0.85rem; text-align: center; }
        @media (max-width: 768px) {
            .sidebar { width: 220px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Persistent Agent Platform</h1>
        <span>SIVARAMAN R</span>
    </header>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Sessions</h2>
                <button class="btn-new" id="newSession">+ New Chat</button>
            </div>
            <div id="sessionList"></div>
        </aside>
        <div class="chat-panel">
            <div class="meta-bar" id="sessionMeta">No session selected</div>
            <div class="loading" id="loading"><div class="spinner"></div><span id="loadingText">Agent working...</span></div>
            <div id="streamLog"></div>
            <div id="messages"></div>
            <div class="controls">
                <select id="solution">
                    <option value="CLI_WRAPPER">Solution 1: CLI</option>
                    <option value="LANGGRAPH">Solution 2: LangGraph</option>
                    <option value="DIFY">Solution 3: Dify</option>
                </select>
                <select id="provider">
                    <option value="CURSOR">Cursor Agent</option>
                    <option value="ANTIGRAVITY">Antigravity</option>
                    <option value="GROK">Grok Build</option>
                </select>
                <input id="prompt" placeholder="Ask your agent..." autocomplete="off">
                <button id="send">Send</button>
            </div>
        </div>
    </div>
    <script>
        const STORAGE_KEY = 'pap_active_session_id';
        let sessionId = localStorage.getItem(STORAGE_KEY);
        let ws = null;

        const messages = document.getElementById('messages');
        const promptInput = document.getElementById('prompt');
        const sendBtn = document.getElementById('send');
        const sessionMeta = document.getElementById('sessionMeta');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const streamLog = document.getElementById('streamLog');
        const sessionList = document.getElementById('sessionList');

        function formatTime(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(protocol + '//' + location.host + '/ws/chat');
            ws.onclose = () => setTimeout(connectWebSocket, 3000);
            ws.onerror = () => ws.close();
            ws.onmessage = (event) => handleWsMessage(JSON.parse(event.data));
        }

        function clearMessages() {
            messages.innerHTML = '';
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.textContent = content;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function renderHistory(history) {
            clearMessages();
            history.forEach(m => appendMessage(m.role.toLowerCase(), m.content));
        }

        async function loadSessions() {
            try {
                const res = await fetch('/api/v1/sessions?limit=50');
                const sessions = await res.json();
                sessionList.innerHTML = '';
                if (!sessions.length) {
                    sessionList.innerHTML = '<div class="empty-sessions">No sessions yet.<br>Start a new chat.</div>';
                    return;
                }
                sessions.forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'session-item' + (s.externalId === sessionId ? ' active' : '');
                    div.dataset.externalId = s.externalId;
                    div.innerHTML = '<div class="title">' + escapeHtml(s.title || 'Untitled') + '</div>'
                        + '<div class="meta">' + s.messageCount + ' msgs · ' + formatTime(s.lastActiveAt) + '</div>';
                    div.onclick = () => selectSession(s.externalId, s.title);
                    sessionList.appendChild(div);
                });
            } catch (e) {
                console.error('Failed to load sessions', e);
            }
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        async function selectSession(externalId, title) {
            sessionId = externalId;
            localStorage.setItem(STORAGE_KEY, sessionId);
            sessionMeta.textContent = 'Session: ' + (title || externalId.substring(0, 8)) + '...';
            clearMessages();
            document.querySelectorAll('.session-item').forEach(el => {
                el.classList.toggle('active', el.dataset.externalId === externalId);
            });
            try {
                const res = await fetch('/api/v1/sessions/external/' + externalId + '/history');
                if (res.ok) {
                    const history = await res.json();
                    renderHistory(history);
                }
            } catch (e) {
                appendMessage('status', 'Could not load history.');
            }
            promptInput.focus();
        }

        function newSession() {
            sessionId = null;
            localStorage.removeItem(STORAGE_KEY);
            clearMessages();
            sessionMeta.textContent = 'New session — send a message to begin';
            document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
            promptInput.focus();
        }

        function setLoading(active, text) {
            loading.classList.toggle('active', active);
            if (text) loadingText.textContent = text;
            sendBtn.disabled = active;
        }

        function handleWsMessage(data) {
            if (data.type === 'status') {
                loadingText.textContent = data.content;
            } else if (data.type === 'stream') {
                streamLog.classList.add('active');
                streamLog.textContent += data.content + '\n';
                streamLog.scrollTop = streamLog.scrollHeight;
            } else if (data.type === 'complete') {
                setLoading(false);
                streamLog.classList.remove('active');
                streamLog.textContent = '';
                sessionId = data.externalSessionId;
                localStorage.setItem(STORAGE_KEY, sessionId);
                sessionMeta.textContent = 'Session: ' + sessionId.substring(0, 8) + '... | ' + data.solutionUsed;
                appendMessage('assistant', data.reply);
                loadSessions();
                promptInput.focus();
            }
        }

        function sendMessage() {
            const message = promptInput.value.trim();
            if (!message || !ws || ws.readyState !== WebSocket.OPEN) return;
            promptInput.value = '';
            setLoading(true, 'Sending to agent...');
            streamLog.textContent = '';
            appendMessage('user', message);
            ws.send(JSON.stringify({
                type: 'chat',
                message,
                sessionId,
                solutionType: document.getElementById('solution').value,
                cliProvider: document.getElementById('provider').value
            }));
        }

        document.getElementById('newSession').onclick = newSession;
        sendBtn.onclick = sendMessage;
        promptInput.onkeydown = e => { if (e.key === 'Enter') sendMessage(); };

        connectWebSocket();
        loadSessions().then(() => {
            if (sessionId) selectSession(sessionId);
            else newSession();
        });
    </script>
</body>
</html>
